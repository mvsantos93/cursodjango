{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinniBlog Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static '/css/styles.css' %}">
</head>
<body>

    {% include 'motorartigos/partials/_header.html' %}

    <main class="main-content container">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'motorartigos/partials/_footer.html' %}

<script>

//
// PESQUISA
//

const searchInput = document.getElementById("searchInput");

if (searchInput){

    searchInput.addEventListener("keyup", function(){

        const texto = this.value.toLowerCase();

        document.querySelectorAll(".card-custom").forEach(card=>{

            const titulo = card.querySelector(".card-title")
                               .textContent
                               .toLowerCase();

            card.parentElement.parentElement.style.display =
                titulo.includes(texto)
                ? ""
                : "none";

        });

    });

}

//
// FILTROS
//

const filtros = document.querySelectorAll(".btn-filter");

filtros.forEach(botao=>{

    botao.addEventListener("click", ()=>{

        filtros.forEach(b=>b.classList.remove("active"));
        botao.classList.add("active");

        const categoria = botao.dataset.filter;

        document.querySelectorAll(".card-custom").forEach(card=>{

            if(categoria=="todos" ||
               card.dataset.category==categoria){

                card.parentElement.parentElement.style.display="";

            }else{

                card.parentElement.parentElement.style.display="none";

            }

        });

    });

});

//
// SLIDER
//

const slider = document.getElementById("slider");

if(slider){

    document.getElementById("next").onclick = ()=>{

        slider.scrollBy({
            left:320,
            behavior:"smooth"
        });

    };

    document.getElementById("prev").onclick = ()=>{

        slider.scrollBy({
            left:-320,
            behavior:"smooth"
        });
    };
}
</script>
</body>
</html>
